<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* Reset y estilo base scoped a #i40-evaluador (no a *, html, body o :root):
     este motor debe poder vivir tanto en una página propia como embebido dentro
     de una landing sin filtrar variables ni estilos al resto de la página que
     lo contenga. Las variables de color viven en #i40-evaluador en vez de
     :root para que no se conviertan en globales de toda la página al embeber. */
  #i40-evaluador, #i40-evaluador *, #i40-evaluador *::before, #i40-evaluador *::after {
    box-sizing: border-box; margin: 0; padding: 0;
  }
  #i40-evaluador {
    --navy: #1D254C;
    --red: #C50339;
    --cream: #F2EBD8;
    --white: #FFFFFF;
    --black: #000000;
    --navy-10: rgba(29,37,76,0.10);
    --navy-20: rgba(29,37,76,0.20);
    --line: rgba(29,37,76,0.14);
    --field-border: rgba(29,37,76,0.32);
    --shadow: 0 1px 2px rgba(29,37,76,.04), 0 14px 30px -20px rgba(29,37,76,.40);
    --shadow-btn: 0 6px 16px -8px rgba(29,37,76,.55);
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Full-bleed: si el motor acaba dentro de la columna de contenido de un tema
       de WordPress (embebido en la landing o pegado directamente), rompe la columna
       y ocupa todo el viewport. Si el contenedor ya es full-width, el cálculo da 0
       y no desplaza nada — seguro en ambos contextos. Sin min-height:100vh: como
       fragmento embebido debe medir lo que mide su contenido, no la pantalla. */
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
  }
  #i40-evaluador > * { width: 100%; }
  #i40-evaluador .hp-field {
    position: absolute !important; left: -9999px !important; top: -9999px !important;
    height: 0 !important; width: 0 !important; opacity: 0 !important; pointer-events: none !important;
  }

  /* Sin header ni footer en el core: embebido en la landing (o en una página de
     WordPress) la web contenedora ya aporta cabecera y pie; duplicarlos metía un
     segundo logo a mitad de página. El shell standalone de la salida 6 (que sí es
     un documento propio) añade los suyos en output6_template.py. */

  /* ── Topbar: identificador fino del widget, no una cabecera ── */
  #i40-evaluador .widget-topbar {
    background: var(--navy);
    border-bottom: 3px solid var(--red);
    padding: 11px 28px;
    text-align: center;
  }
  #i40-evaluador .widget-topbar-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* ── Progress bar ── */
  #i40-evaluador .progress-bar-wrap {
    background: var(--navy-10);
    height: 6px;
    width: 100%;
  }
  #i40-evaluador .progress-bar-inner {
    height: 100%;
    background: var(--red);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Layout ── */
  #i40-evaluador .container {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 56px 32px 96px;
    flex: 1;
  }

  /* ── Intro ── */
  #i40-evaluador .intro-titulo {
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 2.15rem;
    line-height: 1.14;
    letter-spacing: -0.01em;
    color: var(--navy);
    margin-bottom: 16px;
  }
  #i40-evaluador .intro-lead {
    font-size: 1.08rem;
    line-height: 1.6;
    color: var(--navy);
    margin-bottom: 32px;
  }

  /* ── Strip ── */
  #i40-evaluador .strip { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 40px; }
  #i40-evaluador .strip-item {
    background: var(--navy); color: var(--white); padding: 14px 18px; flex: 1 1 auto;
    box-shadow: var(--shadow);
  }
  #i40-evaluador .strip-item .strip-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; opacity: 0.7; margin-bottom: 5px;
  }
  #i40-evaluador .strip-item .strip-valor { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.1rem; }

  /* ── Form fields ── */
  #i40-evaluador .field { margin-bottom: 22px; }
  #i40-evaluador .field label {
    display: block; font-size: 0.82rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--navy); margin-bottom: 7px;
  }
  #i40-evaluador .field input[type="text"],
  #i40-evaluador .field input[type="email"],
  #i40-evaluador .field input[type="tel"],
  #i40-evaluador .field input[type="number"],
  #i40-evaluador .field input[type="date"] {
    width: 100%; padding: 13px 15px; border: 1.5px solid var(--field-border);
    background: var(--white); font-family: 'Inter', sans-serif; font-size: 0.98rem;
    color: var(--navy); outline: none; border-radius: 0;
    box-shadow: inset 0 1px 2px rgba(29,37,76,0.05);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #i40-evaluador .field input::placeholder { color: rgba(29,37,76,0.42); }
  #i40-evaluador .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px var(--navy-10); }
  #i40-evaluador .field input.error { border-color: var(--red); }

  /* ── RGPD ── */
  #i40-evaluador .rgpd-block {
    background: var(--white); border: 1px solid var(--navy-10); padding: 20px 22px;
    margin-bottom: 26px; font-size: 0.82rem; color: var(--navy); line-height: 1.6;
    box-shadow: var(--shadow);
  }
  #i40-evaluador .rgpd-block a { color: var(--red); }
  #i40-evaluador .rgpd-check {
    display: flex; align-items: flex-start; gap: 10px; margin-top: 14px;
    font-size: 0.84rem; font-weight: 500; cursor: pointer;
  }
  #i40-evaluador .rgpd-check input[type="checkbox"] {
    margin-top: 2px; accent-color: var(--navy); width: 17px; height: 17px;
    flex-shrink: 0; border-radius: 0;
  }

  /* ── Opciones de pregunta ── */
  #i40-evaluador .pregunta-block {
    background: var(--white); border: 1px solid var(--line); border-top: 3px solid var(--red);
    padding: 32px 36px 30px; margin-bottom: 22px; box-shadow: var(--shadow);
  }
  #i40-evaluador .pregunta-titulo {
    font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.18rem;
    color: var(--navy); margin-bottom: 10px; line-height: 1.35;
  }
  #i40-evaluador .pregunta-ayuda {
    font-size: 0.87rem; color: rgba(29,37,76,0.62); margin-bottom: 22px; line-height: 1.55;
  }
  #i40-evaluador .opciones-lista { display: flex; flex-direction: column; gap: 11px; }
  #i40-evaluador .opcion {
    display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px;
    border: 1.5px solid var(--navy-20); background: var(--white); cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s; text-align: left;
    font-family: 'Inter', sans-serif; font-size: 0.96rem; line-height: 1.45; color: var(--navy);
    border-radius: 0; width: 100%;
  }
  #i40-evaluador .opcion:hover { border-color: var(--navy); background: var(--cream); transform: translateY(-1px); box-shadow: 0 4px 10px -6px rgba(29,37,76,.35); }
  #i40-evaluador .opcion.selected {
    border-color: var(--navy); background: var(--navy); color: var(--white);
    animation: i40-select-pulse 0.28s ease;
  }
  @keyframes i40-select-pulse {
    0% { transform: scale(1); }
    45% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  #i40-evaluador .opcion .opcion-radio {
    width: 19px; height: 19px; border: 2px solid currentColor; border-radius: 0;
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  #i40-evaluador .opcion.selected .opcion-radio { background: var(--red); border-color: var(--red); }
  #i40-evaluador .opcion.selected .opcion-radio::after {
    content: ''; width: 5px; height: 9px; border: solid var(--white); border-width: 0 2px 2px 0;
    transform: rotate(45deg); margin-top: -2px; display: block;
  }

  /* ── Section header ── */
  #i40-evaluador .section-header {
    font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--red);
    border-bottom: 2px solid var(--red); padding-bottom: 8px; margin-bottom: 22px; margin-top: 40px;
  }
  #i40-evaluador .section-header:first-child { margin-top: 0; }

  /* ── Botones ── */
  #i40-evaluador .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 30px; font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 600;
    cursor: pointer; border: none; border-radius: 0; text-decoration: none;
    transition: background 0.2s, color 0.2s, transform 0.12s, box-shadow 0.2s;
  }
  #i40-evaluador .btn-primary { background: var(--navy); color: var(--white); box-shadow: var(--shadow-btn); }
  #i40-evaluador .btn-primary:hover { background: #111828; transform: translateY(-1px); }
  #i40-evaluador .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #i40-evaluador .btn-secondary { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }
  #i40-evaluador .btn-secondary:hover { background: var(--navy); color: var(--white); }
  #i40-evaluador .btn-red { background: var(--red); color: var(--white); box-shadow: 0 6px 16px -8px rgba(197,3,57,.55); }
  #i40-evaluador .btn-red:hover { background: #a00230; transform: translateY(-1px); }

  /* ── Step nav ── */
  #i40-evaluador .step-nav { display: flex; gap: 14px; margin-top: 34px; align-items: center; flex-wrap: wrap; }

  /* ── Bloqueo panel ── */
  #i40-evaluador .bloqueo-panel { background: var(--navy); color: var(--white); padding: 40px 38px; margin-top: 20px; box-shadow: var(--shadow); }
  #i40-evaluador .bloqueo-panel h2 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 12px; line-height: 1.3; }
  #i40-evaluador .bloqueo-panel > p { font-size: 0.92rem; line-height: 1.65; opacity: 0.86; margin-bottom: 28px; }
  #i40-evaluador .bloqueo-panel .field { margin-bottom: 20px; }
  #i40-evaluador .bloqueo-panel .field label { color: rgba(255,255,255,0.82); }
  #i40-evaluador .bloqueo-panel .field input {
    background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.30); color: var(--white);
    box-shadow: none;
  }
  #i40-evaluador .bloqueo-panel .field input::placeholder { color: rgba(255,255,255,0.45); }
  #i40-evaluador .bloqueo-panel .field input:focus { border-color: var(--white); box-shadow: 0 0 0 3px rgba(255,255,255,0.12); }
  #i40-evaluador .bloqueo-panel .btn-red { margin-top: 8px; }
  #i40-evaluador .bloqueo-confirm-msg { font-size: 0.92rem; color: rgba(255,255,255,0.88); margin-top: 12px; line-height: 1.6; }
  #i40-evaluador .bloqueo-volver {
    display: block; margin-top: 26px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 0.83rem; color: rgba(255,255,255,0.6);
    cursor: pointer; border-left: none; border-right: none; border-bottom: none;
    background: none; font-family: 'Inter', sans-serif; text-decoration: underline; text-align: left; width: 100%;
  }
  #i40-evaluador .bloqueo-volver:hover { color: var(--white); }

  /* ── Resultado ── */
  #i40-evaluador .resultado-card { background: var(--white); border: 1px solid var(--line); border-top: 3px solid var(--red); padding: 38px 36px; margin-bottom: 22px; box-shadow: var(--shadow); }
  #i40-evaluador .resultado-empresa { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--red); margin-bottom: 10px; }
  #i40-evaluador .eleg-apto { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.25rem; color: var(--navy); margin-bottom: 16px; line-height: 1.4; }
  #i40-evaluador .veredicto-texto { font-size: 0.98rem; line-height: 1.65; color: var(--navy); }

  #i40-evaluador .concurrencia-block { background: var(--cream); border-left: 4px solid var(--red); padding: 26px 28px; margin-bottom: 20px; box-shadow: var(--shadow); }
  #i40-evaluador .concurrencia-block p { font-size: 0.94rem; line-height: 1.6; color: var(--navy); margin-bottom: 12px; }
  #i40-evaluador .concurrencia-block p:last-child { margin-bottom: 0; }

  #i40-evaluador .score-display { display: flex; gap: 20px; flex-wrap: wrap; margin: 24px 0 4px; }
  #i40-evaluador .score-box { flex: 1 1 auto; background: var(--cream); padding: 22px 24px; text-align: center; }
  #i40-evaluador .score-box .score-num { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 3rem; color: var(--navy); line-height: 1; }
  #i40-evaluador .score-box .score-label { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(29,37,76,0.6); margin-top: 8px; }
  #i40-evaluador .score-box.potencial .score-num { color: var(--red); }

  #i40-evaluador .score-bar-wrap { height: 10px; background: var(--navy-10); margin: 22px 0 8px; }
  #i40-evaluador .score-bar-inner { height: 100%; background: var(--navy); transition: width 0.6s ease; width: 0%; }

  #i40-evaluador .calc-block { background: var(--white); border: 1px solid var(--line); padding: 30px 32px; margin-bottom: 20px; box-shadow: var(--shadow); }
  #i40-evaluador .calc-block h3 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.1rem; color: var(--navy); margin-bottom: 10px; }
  #i40-evaluador .calc-formula { font-size: 0.85rem; color: rgba(29,37,76,0.62); margin-bottom: 20px; line-height: 1.55; }
  #i40-evaluador .calc-block .field { margin-bottom: 0; }
  #i40-evaluador .calc-result { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.8rem; color: var(--red); margin-top: 16px; }

  #i40-evaluador .cta-block { background: var(--navy); color: var(--white); border-top: 3px solid var(--red); padding: 36px; margin-bottom: 22px; box-shadow: var(--shadow); }
  #i40-evaluador .cta-block h2 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.4rem; margin-bottom: 12px; line-height: 1.3; }
  #i40-evaluador .cta-block .cta-desc { font-size: 0.93rem; opacity: 0.88; line-height: 1.65; margin-bottom: 18px; }
  #i40-evaluador .cta-block .cta-contacto { font-size: 0.96rem; font-weight: 500; line-height: 1.6; }
  #i40-evaluador .cta-block a { color: var(--white); }

  #i40-evaluador .nota-fuente { font-size: 0.74rem; color: rgba(29,37,76,0.5); margin-top: 28px; line-height: 1.55; }
  #i40-evaluador .form-error { color: var(--red); font-size: 0.83rem; margin-top: 11px; display: none; }

  @media (max-width: 480px) {
    #i40-evaluador .container { padding: 36px 20px 72px; }
    #i40-evaluador .intro-titulo { font-size: 1.55rem; }
    #i40-evaluador .strip { gap: 8px; }
    #i40-evaluador .strip-item { padding: 10px 14px; }
    #i40-evaluador .score-display { gap: 12px; }
    #i40-evaluador .score-box .score-num { font-size: 2.4rem; }
    #i40-evaluador .pregunta-block { padding: 24px 20px 22px; }
    #i40-evaluador .resultado-card { padding: 26px 20px; }
    #i40-evaluador .cta-block { padding: 26px 20px; }
    #i40-evaluador .bloqueo-panel { padding: 28px 22px; }
  }
</style>

<div class="evaluador-widget" id="i40-evaluador">

<div class="widget-topbar">
  <span class="widget-topbar-tag">Evaluador de encaje</span>
</div>

<div class="progress-bar-wrap" id="progress-bar-wrap" style="display:none">
  <div class="progress-bar-inner" id="progress-bar-inner"></div>
</div>

<main class="container">
  <div id="screen-content"></div>
</main>

</div>

<script>
const CFG = {{CFG_JSON}};
const BACKEND_URL = "{{BACKEND_URL}}";

const STATE = {
  nombre: "", empresa: "", municipio: "",
  email: "", tel: "", rgpd: false,
  respuestas: {},
  bloqueado: false,
  bloqueoMotivo: "",
};

function getPageUrl() {
  try { if (window.parent && window.parent !== window && window.parent.location) { return window.parent.location.href; } } catch (e) {}
  return window.location.href;
}

var SCREENS = [];
var currentIdx = 0;

// ── Helpers de tipo ──────────────────────────────
function isObjetivo(preg) {
  return !preg.tipo || preg.tipo === "objetivo";
}

// ── Build screen sequence ────────────────────────
function buildScreens() {
  SCREENS = [{ type: "inicio" }];
  (CFG.elegibilidad || []).forEach(function(_, i) {
    SCREENS.push({ type: "eleg", idx: i });
  });
  var grupos = CFG.grupos_baremo || [];
  if (grupos.length > 0) {
    grupos.forEach(function(g, i) {
      var pregsGrupo = (CFG.baremo || []).filter(function(p) {
        return (g.ids || []).indexOf(p.id) !== -1;
      });
      if (pregsGrupo.some(isObjetivo)) {
        SCREENS.push({ type: "grupo", idx: i });
      }
    });
  } else if ((CFG.baremo || []).some(isObjetivo)) {
    SCREENS.push({ type: "grupo", idx: -1 });
  }
  if ((CFG.datos_proyecto || []).length > 0) {
    SCREENS.push({ type: "proyecto" });
  }
  SCREENS.push({ type: "contacto" });
}

// ── Navigation ───────────────────────────────────
function avanzar() {
  if (currentIdx < SCREENS.length - 1) { currentIdx++; renderScreen(); }
}

function retroceder() {
  if (STATE.bloqueado) { STATE.bloqueado = false; renderScreen(); return; }
  if (currentIdx > 0) { currentIdx--; renderScreen(); }
}

function updateProgress() {
  var wrap = document.getElementById("progress-bar-wrap");
  var bar  = document.getElementById("progress-bar-inner");
  if (currentIdx === 0 && !STATE.bloqueado) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  var pct = Math.round(currentIdx / SCREENS.length * 100);
  bar.style.width = pct + "%";
}

function scrollWidgetToTop() {
  // Nunca window.scrollTo: el motor puede vivir embebido a mitad de una landing
  // (fragmento inline, sin iframe), y eso arrastraría TODA la página a y=0 en
  // vez de solo el widget. scrollIntoView desplaza justo lo necesario para que
  // la cabecera del widget quede arriba del viewport, tanto si es la página
  // entera (standalone) como si es un bloque embebido a mitad de la landing.
  var widget = document.querySelector(".evaluador-widget");
  if (widget && widget.scrollIntoView) {
    widget.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function renderScreen() {
  updateProgress();
  scrollWidgetToTop();
  if (STATE.bloqueado) { renderBloqueo(); return; }
  var s = SCREENS[currentIdx];
  if      (s.type === "inicio")   renderInicio();
  else if (s.type === "eleg")     renderEleg(s.idx);
  else if (s.type === "grupo")    renderGrupo(s.idx);
  else if (s.type === "proyecto") renderProyecto();
  else if (s.type === "contacto") renderContacto();
}

// ── Helpers ──────────────────────────────────────
function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function formatEur(n) { return Math.round(n).toLocaleString("es-ES") + " €"; }
function getBaremoById(id) {
  return (CFG.baremo || []).find(function(p) { return p.id === id; });
}
function setContent(html) {
  document.getElementById("screen-content").innerHTML = html;
}

// ── PASO 1 — Inicio ──────────────────────────────
function renderInicio() {
  var stripHtml = (CFG.strip || []).map(function(item) {
    return '<div class="strip-item">' +
      '<div class="strip-label">' + escHtml(item.label) + '</div>' +
      '<div class="strip-valor">' + escHtml(item.valor) + '</div>' +
      '</div>';
  }).join('');

  setContent(
    '<p class="intro-titulo">' + escHtml(CFG.textos.intro_titulo || "") + '</p>' +
    '<p class="intro-lead">' + escHtml(CFG.textos.intro_lead || "") + '</p>' +
    (stripHtml ? '<div class="strip">' + stripHtml + '</div>' : '') +
    '<div class="field"><label for="f-nombre">Tu nombre *</label>' +
    '<input type="text" id="f-nombre" placeholder="Nombre y apellidos" autocomplete="name" value="' + escHtml(STATE.nombre) + '" /></div>' +
    '<div class="field"><label for="f-empresa">Empresa *</label>' +
    '<input type="text" id="f-empresa" placeholder="Nombre de la empresa" autocomplete="organization" value="' + escHtml(STATE.empresa) + '" /></div>' +
    '<div class="field"><label for="f-municipio">Municipio</label>' +
    '<input type="text" id="f-municipio" placeholder="Municipio donde opera la empresa" autocomplete="address-level2" value="' + escHtml(STATE.municipio) + '" /></div>' +
    '<div class="rgpd-block">' +
    '<strong>Información sobre protección de datos</strong><br /><br />' +

// ── Validación de formato ─────────────────────────
function isValidEmail(v) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
}
function isValidTel(v) {
  // Quita espacios y separadores; admite 9 dígitos, con prefijo +34/0034 opcional.
  var s = String(v || "").replace(/[\s.\-()]/g, "");
  return /^(?:\+34|0034)?\d{9}$/.test(s);
}

async function onContactoSubmit() {
  var emailEl = document.getElementById("f-email");
  var telEl   = document.getElementById("f-tel");
  var email = emailEl.value.trim();
  var tel   = telEl.value.trim();
  var errEl = document.getElementById("e-contacto");
  var btnEl = document.getElementById("btn-ver-resultado");

  // Honeypot: si el campo oculto viene relleno, es un envío automatizado.
  // Se descarta en silencio, sin mostrar resultado ni enviar nada.
  var honeypot = (document.getElementById("f-website") || {}).value || "";
  if (honeypot.trim()) { return; }

  emailEl.classList.remove("error");
  telEl.classList.remove("error");

  if (!email || !isValidEmail(email)) {
    emailEl.classList.add("error");
    errEl.textContent = email
      ? "El email no tiene un formato válido (ejemplo: nombre@empresa.com)."
      : "Indica tu email para ver el resultado.";
    errEl.style.display = "block";
    emailEl.focus();
    return;
  }
  if (!tel || !isValidTel(tel)) {
    telEl.classList.add("error");
    errEl.textContent = tel
      ? "El teléfono debe tener 9 dígitos (puedes incluir el prefijo +34)."
      : "Indica tu teléfono para ver el resultado.";
    errEl.style.display = "block";
    telEl.focus();
    return;
  }
  errEl.style.display = "none";
  STATE.email = email;
  STATE.tel   = tel;

  autoFillRedaccion();
  var score = calcularScore();

  if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Enviando..."; }

  var ok = await enviarEvaluacion(score);

  if (ok) {
    renderResultado(score);
  } else {
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Ver mi resultado →"; }
    errEl.textContent = "No hemos podido enviar la evaluación en este momento. Inténtalo de nuevo o contacta directamente con Innóvate 4.0.";
    errEl.style.display = "block";
  }
}

// ── Auto-relleno de criterios de redacción ───────
// Los criterios tipo "redaccion" no se preguntan al usuario: Innóvate 4.0
// se encarga de la memoria y se asume puntuación máxima en todos ellos.
function autoFillRedaccion() {
  (CFG.baremo || []).forEach(function(preg) {
    if (preg.tipo === "redaccion" && !STATE.respuestas[preg.id]) {
      STATE.respuestas[preg.id] = {
        opIdx: -1,
        puntos: preg.puntos_max || 0,
        label: "Redacción a cargo de Innóvate 4.0",
        esBloqueo: false,
        bloquea: false,
        preguntaLabel: preg.pregunta,
        puntosMax: preg.puntos_max || 0,
        influenciable: false,
        autoRedaccion: true,
      };
    }
  });
}

// ── Score ────────────────────────────────────────
function calcularScore() {
  var objetivo = 0, redaccion = 0, ganancia = 0;
  var max      = CFG.puntos_max_total || 0;
  var mejoras  = [];

  Object.keys(STATE.respuestas).forEach(function(id) {
    var r = STATE.respuestas[id];
    if (r.esBloqueo) return;
    if (r.autoRedaccion) {
      redaccion += r.puntos || 0;
    } else {
      objetivo += r.puntos || 0;
      if (r.influenciable && r.puntosMax > (r.puntos || 0)) {
        var g = r.puntosMax - (r.puntos || 0);
        ganancia += g;
        mejoras.push({ pregunta: r.preguntaLabel, puntos_ganables: g });
      }
    }
  });

  return {
    objetivo:   objetivo,
    redaccion:  redaccion,
    actual:     objetivo + redaccion,
    potencial:  objetivo + redaccion + ganancia,
    max:        max,
    mejoras:    mejoras,
  };
}

// ── Resumen legible para el email (etiquetas en castellano) ──
function buildResumen(score, veredicto) {
  var resumen = [
    { label: "Estado de elegibilidad", value: "Cumple los requisitos de acceso declarados" },
  ];
  if (score.max > 0) {
    resumen.push({ label: "Puntuación estimada", value: score.actual + " / " + score.max });
    if (score.potencial > score.actual) {
      resumen.push({ label: "Puntuación potencial trabajando mejoras", value: score.potencial + " / " + score.max });
    }
  }
  resumen.push({ label: "Veredicto", value: veredicto });
  if (STATE.municipio) resumen.push({ label: "Municipio", value: STATE.municipio });
  return resumen;
}

function buildPendingActions(score) {
  return (score.mejoras || []).map(function(m) {
    return {
      gain: "+" + m.puntos_ganables,
      title: m.pregunta,
      text: "Criterio influenciable: trabajarlo antes de presentar la solicitud puede sumar estos puntos.",
    };
  });
}

// ── Render resultado ─────────────────────────────
function renderResultado(score) {
  document.getElementById("progress-bar-wrap").style.display = "block";
  document.getElementById("progress-bar-inner").style.width = "100%";

  var empresa  = STATE.empresa;
  var pct      = score.max > 0 ? score.actual / score.max : 0;
  var veredicto = pct >= 0.65
    ? (CFG.textos.veredicto_alto  || "")
    : pct >= 0.35
      ? (CFG.textos.veredicto_medio || "")
      : (CFG.textos.veredicto_bajo  || "");
  veredicto = veredicto.replace(/\{empresa\}/g, empresa);

  var margen = Math.max(0, score.potencial - score.actual);

  // Mensaje de elegibilidad: quien llega a esta pantalla ha superado los requisitos de acceso.
  var elegBadge =
    '<p class="eleg-apto">✓ Tu empresa cumple los requisitos de acceso a esta convocatoria</p>';

  var html = "";

  if (score.max > 0) {
    var margenBox = margen > 0
      ? '<div class="score-box potencial">' +
        '<div class="score-num">+' + margen + '</div>' +
        '<div class="score-label">Puntos de margen de mejora</div>' +
        '</div>'
      : '';

    html +=
      '<div class="resultado-card">' +
      '<p class="resultado-empresa">' + escHtml(empresa) + '</p>' +
      elegBadge +
      '<p class="veredicto-texto">' + escHtml(veredicto) + '</p>' +
      '<div class="score-display">' +
      '<div class="score-box"><div class="score-num">' + score.actual + '</div>' +
      '<div class="score-label">Puntuación estimada</div></div>' +
      margenBox + '</div>' +
      '<div class="score-bar-wrap"><div class="score-bar-inner" id="bar-act"></div></div>' +
      '<p style="font-size:0.75rem;color:rgba(29,37,76,0.55);margin-top:6px;">Puntuación estimada sobre ' + score.max + ' puntos totales</p>' +
      '</div>';
  } else {
    html +=
      '<div class="resultado-card">' +
      '<p class="resultado-empresa">' + escHtml(empresa) + '</p>' +
      elegBadge +
      '<p class="veredicto-texto">' + escHtml(veredicto) + '</p>' +
      '</div>';
  }

  // Mensaje fijo: en concurrencia competitiva la puntuación se argumenta en la memoria.
  if (score.max > 0) {
    html +=
      '<div class="concurrencia-block">' +
      '<p>En concurrencia competitiva, la puntuación no se obtiene marcando casillas: ' +
      'cada criterio debe <strong>argumentarse y justificarse en la memoria técnica</strong>. ' +
      'Dos empresas con el mismo perfil pueden obtener puntuaciones muy distintas según cómo esté redactada su memoria.</p>' +
      '<p>Ahí es donde entra el trabajo de Innóvate 4.0: convertir tu margen de mejora en puntos reales sobre el papel.</p>' +
      '</div>';
  }

  var inv = CFG.inversion;
  if (inv) {
    html += '<p class="section-header">Estimación de la ayuda</p>' +
      '<div class="calc-block"><h3>Calculadora de ayuda estimada</h3>' +
      '<p class="calc-formula">' + escHtml(inv.formula_texto || "") + '</p>';
    if (inv.tiene_campo) {
      html += '<div class="field"><label for="calc-inv">' + escHtml(inv.etiqueta_campo || "Inversión elegible prevista (€)") + '</label>' +
        '<input type="number" id="calc-inv" placeholder="Ej: 150000" min="0" step="1000" /></div>' +
        '<div class="calc-result" id="calc-result"></div>';
    } else if (inv.importe_fijo) {
      html += '<div class="calc-result">' + formatEur(inv.importe_fijo) + '</div>';
    }
    html += '</div>';
  }

  html +=
    '<div class="cta-block">' +
    '<h2>' + escHtml(CFG.textos.cta_titulo || "") + '</h2>' +
    '<p class="cta-desc">' + escHtml(CFG.textos.cta_texto || "") + '</p>' +
    '<p class="cta-contacto">¿Hablamos? Escríbenos a ' +
    '<a href="mailto:proyectos2@innovate40.es">proyectos2@innovate40.es</a>' +
    ' o llámanos al <a href="tel:+34960666610">960 66 66 10</a>.</p>' +
    '</div>';

  if (CFG.textos.nota_fuente) {
    html += '<p class="nota-fuente">' + escHtml(CFG.textos.nota_fuente) + '</p>';
  }

  setContent(html);

  // Animate bar
  if (score.max > 0) {
    var pctA = Math.round((score.actual / score.max) * 100);
    setTimeout(function() { var b = document.getElementById("bar-act"); if (b) b.style.width = pctA + "%"; }, 100);
  }

  // Bind investment calculator
  if (inv && inv.tiene_campo) {
    var inp = document.getElementById("calc-inv");
    var res = document.getElementById("calc-result");
    if (inp && res) {
      inp.addEventListener("input", function() {
        var val  = parseFloat(inp.value) || 0;
        if (val <= 0) { res.textContent = ""; return; }
        var pMin = inv.pct_min || 0, pMax = inv.pct_max || 0, tope = inv.tope_euros || Infinity;
        var aMin = Math.min(val * pMin / 100, tope);
        var aMax = Math.min(val * pMax / 100, tope);
        res.textContent = pMin !== pMax
          ? "Ayuda estimada: " + formatEur(aMin) + " – " + formatEur(aMax)
          : "Ayuda estimada: " + formatEur(aMax);
      });
    }
  }
}

// ── Envío del resultado (vía backend + Resend) ────────────────────────────
// El resultado NUNCA se muestra hasta que el backend confirme el envío
// correcto del email al cliente (ver onContactoSubmit).
async function enviarEvaluacion(score) {
  if (!BACKEND_URL) return false;
  var pct = score.max > 0 ? score.actual / score.max : 0;
  var veredicto = pct >= 0.65
    ? (CFG.textos.veredicto_alto  || "")
    : pct >= 0.35
      ? (CFG.textos.veredicto_medio || "")
      : (CFG.textos.veredicto_bajo  || "");
  veredicto = veredicto.replace(/\{empresa\}/g, STATE.empresa);

  try {
    var res = await fetch(BACKEND_URL + "/submit-evaluation", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        source: "Evaluador de encaje Innóvate 4.0",
        tool: CFG.titulo_corto || (CFG.textos && CFG.textos.titulo_evaluador) || "",
        created_at: new Date().toISOString(),
        page_url: getPageUrl(),
        lead: {
          nombre: STATE.nombre,
          empresa: STATE.empresa,
          poblacion: STATE.municipio,
          telefono: STATE.tel,
          email: STATE.email,
          website: (document.getElementById("f-website") || {}).value || "",
          privacy: !!STATE.rgpd,
        },
        summary: buildResumen(score, veredicto),
        answers: STATE.respuestas,
        pending_actions: buildPendingActions(score),
        legal_note: "Resultado orientativo. La puntuación final depende de la evaluación del organismo convocante.",
      }),
    });
    var data = {};
    try { data = await res.json(); } catch (e) {}
    return res.ok && data.success !== false;
  } catch (e) {
    return false;
  }
}

// ── Lead de la pantalla de no elegibilidad (vía backend + Resend) ────────
async function enviarLeadNoElegible(email, tel) {
  if (!BACKEND_URL) return false;
  try {
    var res = await fetch(BACKEND_URL + "/submit-evaluation", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        source: "Evaluador de encaje Innóvate 4.0 (no elegible)",
        tool: CFG.titulo_corto || (CFG.textos && CFG.textos.titulo_evaluador) || "",
        created_at: new Date().toISOString(),
        page_url: getPageUrl(),
        lead: {
          nombre: STATE.nombre,
          empresa: STATE.empresa,
          poblacion: STATE.municipio,
          telefono: tel,
          email: email,
          website: (document.getElementById("b-website") || {}).value || "",
          privacy: !!STATE.rgpd,
        },
        summary: [{ label: "Motivo de no elegibilidad", value: STATE.bloqueoMotivo || "No especificado" }],
        answers: STATE.respuestas,
        pending_actions: [],
        legal_note: "Solicitud de información sobre otras ayudas adaptadas al perfil de la empresa.",
      }),
    });
    var data = {};
    try { data = await res.json(); } catch (e) {}
    return res.ok && data.success !== false;
  } catch (e) {
    return false;
  }
}

document.addEventListener("DOMContentLoaded", function() {
  try {
    buildScreens();
    renderScreen();
  } catch (err) {
    document.getElementById("screen-content").innerHTML =
      '<div style="background:#c50339;color:#fff;padding:24px;margin:40px 0;">' +
      '<strong>Error al cargar el evaluador:</strong> ' + String(err) + '</div>';
  }
});
