<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* Reset y estilo base scoped a .evaluador-widget (no a *, html, body o :root):
     este motor debe poder vivir tanto en una página propia como embebido dentro
     de una landing sin filtrar variables ni estilos al resto de la página que
     lo contenga. Las variables de color viven en .evaluador-widget en vez de
     :root para que no se conviertan en globales de toda la página al embeber. */
  .evaluador-widget, .evaluador-widget *, .evaluador-widget *::before, .evaluador-widget *::after {
    box-sizing: border-box; margin: 0; padding: 0;
  }
  .evaluador-widget {
    --navy: #1D254C;
    --red: #C50339;
    --cream: #F2EBD8;
    --white: #FFFFFF;
    --black: #000000;
    --navy-10: rgba(29,37,76,0.10);
    --navy-20: rgba(29,37,76,0.20);
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .evaluador-widget .hp-field {
    position: absolute !important; left: -9999px !important; top: -9999px !important;
    height: 0 !important; width: 0 !important; opacity: 0 !important; pointer-events: none !important;
  }

  /* ── Header ── */
  .evaluador-widget .site-header {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--red);
  }
  .evaluador-widget .site-header img { display: block; }
  .evaluador-widget .site-header .header-tag {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Progress bar ── */
  .evaluador-widget .progress-bar-wrap {
    background: var(--navy-10);
    height: 4px;
    width: 100%;
  }
  .evaluador-widget .progress-bar-inner {
    height: 100%;
    background: var(--red);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Layout ── */
  .evaluador-widget .container {
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 80px;
    flex: 1;
  }

  /* ── Intro ── */
  .evaluador-widget .intro-titulo {
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 2rem;
    line-height: 1.15;
    color: var(--navy);
    margin-bottom: 14px;
  }
  .evaluador-widget .intro-lead {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--navy);
    margin-bottom: 28px;
  }

  /* ── Strip ── */
  .evaluador-widget .strip { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 36px; }
  .evaluador-widget .strip-item { background: var(--navy); color: var(--white); padding: 10px 16px; flex: 1 1 auto; }
  .evaluador-widget .strip-item .strip-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; margin-bottom: 4px;
  }
  .evaluador-widget .strip-item .strip-valor { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1rem; }

  /* ── Form fields ── */
  .evaluador-widget .field { margin-bottom: 20px; }
  .evaluador-widget .field label {
    display: block; font-size: 0.82rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--navy); margin-bottom: 6px;
  }
  .evaluador-widget .field input[type="text"],
  .evaluador-widget .field input[type="email"],
  .evaluador-widget .field input[type="tel"],
  .evaluador-widget .field input[type="number"] {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--navy-20);
    background: var(--white); font-family: 'Inter', sans-serif; font-size: 0.95rem;
    color: var(--navy); outline: none; border-radius: 0; transition: border-color 0.2s;
  }
  .evaluador-widget .field input:focus { border-color: var(--navy); }
  .evaluador-widget .field input.error { border-color: var(--red); }

  /* ── RGPD ── */
  .evaluador-widget .rgpd-block {
    background: var(--white); border: 1px solid var(--navy-10); padding: 16px;
    margin-bottom: 24px; font-size: 0.8rem; color: var(--navy); line-height: 1.55;
  }
  .evaluador-widget .rgpd-block a { color: var(--red); }
  .evaluador-widget .rgpd-check {
    display: flex; align-items: flex-start; gap: 10px; margin-top: 12px;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
  }
  .evaluador-widget .rgpd-check input[type="checkbox"] {
    margin-top: 2px; accent-color: var(--navy); width: 16px; height: 16px;
    flex-shrink: 0; border-radius: 0;
  }

  /* ── Opciones de pregunta ── */
  .evaluador-widget .pregunta-block {
    background: var(--white); border: 1px solid var(--navy-10); padding: 22px; margin-bottom: 20px;
  }
  .evaluador-widget .pregunta-titulo {
    font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1rem;
    color: var(--navy); margin-bottom: 8px;
  }
  .evaluador-widget .pregunta-ayuda {
    font-size: 0.82rem; color: rgba(29,37,76,0.65); margin-bottom: 14px; line-height: 1.5;
  }
  .evaluador-widget .opciones-lista { display: flex; flex-direction: column; gap: 8px; }
  .evaluador-widget .opcion {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
    border: 1.5px solid var(--navy-20); background: var(--white); cursor: pointer;
    transition: border-color 0.15s, background 0.15s; text-align: left;
    font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--navy);
    border-radius: 0; width: 100%;
  }
  .evaluador-widget .opcion:hover { border-color: var(--navy); background: var(--cream); }
  .evaluador-widget .opcion.selected { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .evaluador-widget .opcion .opcion-radio {
    width: 16px; height: 16px; border: 2px solid currentColor; border-radius: 0;
    flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  }
  .evaluador-widget .opcion.selected .opcion-radio::after { content: ''; width: 8px; height: 8px; background: var(--white); display: block; }

  /* ── Section header ── */
  .evaluador-widget .section-header {
    font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--red);
    border-bottom: 2px solid var(--red); padding-bottom: 6px; margin-bottom: 20px; margin-top: 36px;
  }
  .evaluador-widget .section-header:first-child { margin-top: 0; }

  /* ── Botones ── */
  .evaluador-widget .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 28px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none; border-radius: 0; transition: background 0.2s, color 0.2s; text-decoration: none;
  }
  .evaluador-widget .btn-primary { background: var(--navy); color: var(--white); }
  .evaluador-widget .btn-primary:hover { background: #111828; }
  .evaluador-widget .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .evaluador-widget .btn-secondary { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }
  .evaluador-widget .btn-secondary:hover { background: var(--navy); color: var(--white); }
  .evaluador-widget .btn-red { background: var(--red); color: var(--white); }
  .evaluador-widget .btn-red:hover { background: #a00230; }

  /* ── Step nav ── */
  .evaluador-widget .step-nav { display: flex; gap: 12px; margin-top: 28px; align-items: center; flex-wrap: wrap; }

  /* ── Bloqueo panel ── */
  .evaluador-widget .bloqueo-panel { background: var(--navy); color: var(--white); padding: 28px; margin-top: 8px; }
  .evaluador-widget .bloqueo-panel h2 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.4rem; margin-bottom: 10px; }
  .evaluador-widget .bloqueo-panel > p { font-size: 0.9rem; line-height: 1.6; opacity: 0.88; margin-bottom: 20px; }
  .evaluador-widget .bloqueo-panel .field label { color: rgba(255,255,255,0.8); }
  .evaluador-widget .bloqueo-panel .field input {
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); color: var(--white);
  }
  .evaluador-widget .bloqueo-panel .field input::placeholder { color: rgba(255,255,255,0.4); }
  .evaluador-widget .bloqueo-panel .field input:focus { border-color: var(--white); }
  .evaluador-widget .bloqueo-confirm-msg { font-size: 0.9rem; color: rgba(255,255,255,0.88); margin-top: 12px; }
  .evaluador-widget .bloqueo-volver {
    display: inline-block; margin-top: 16px; font-size: 0.82rem; color: rgba(255,255,255,0.55);
    cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; text-decoration: underline;
  }
  .evaluador-widget .bloqueo-volver:hover { color: var(--white); }

  /* ── Resultado ── */
  .evaluador-widget .resultado-card { background: var(--white); border: 1px solid var(--navy-10); padding: 28px; margin-bottom: 20px; }
  .evaluador-widget .resultado-empresa { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--red); margin-bottom: 8px; }
  .evaluador-widget .eleg-apto { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.1rem; color: var(--navy); margin-bottom: 14px; line-height: 1.4; }
  .evaluador-widget .veredicto-texto { font-size: 0.95rem; line-height: 1.65; color: var(--navy); }

  .evaluador-widget .concurrencia-block { background: var(--cream); border-left: 3px solid var(--red); padding: 22px 24px; margin-bottom: 20px; }
  .evaluador-widget .concurrencia-block p { font-size: 0.92rem; line-height: 1.6; color: var(--navy); margin-bottom: 12px; }
  .evaluador-widget .concurrencia-block p:last-child { margin-bottom: 0; }

  .evaluador-widget .score-display { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
  .evaluador-widget .score-box { flex: 1 1 auto; background: var(--cream); padding: 16px 20px; text-align: center; }
  .evaluador-widget .score-box .score-num { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 2.5rem; color: var(--navy); line-height: 1; }
  .evaluador-widget .score-box .score-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(29,37,76,0.6); margin-top: 6px; }
  .evaluador-widget .score-box.potencial .score-num { color: var(--red); }

  .evaluador-widget .score-bar-wrap { height: 8px; background: var(--navy-10); margin-bottom: 6px; }
  .evaluador-widget .score-bar-inner { height: 100%; background: var(--navy); transition: width 0.6s ease; width: 0%; }

  .evaluador-widget .calc-block { background: var(--white); border: 1px solid var(--navy-10); padding: 24px; margin-bottom: 20px; }
  .evaluador-widget .calc-block h3 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1rem; color: var(--navy); margin-bottom: 8px; }
  .evaluador-widget .calc-formula { font-size: 0.8rem; color: rgba(29,37,76,0.65); margin-bottom: 16px; line-height: 1.5; }
  .evaluador-widget .calc-result { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.6rem; color: var(--red); margin-top: 12px; }

  .evaluador-widget .cta-block { background: var(--navy); color: var(--white); padding: 28px; margin-bottom: 20px; }
  .evaluador-widget .cta-block h2 { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 1.3rem; margin-bottom: 10px; }
  .evaluador-widget .cta-block .cta-desc { font-size: 0.9rem; opacity: 0.88; line-height: 1.6; margin-bottom: 14px; }
  .evaluador-widget .cta-block .cta-contacto { font-size: 0.95rem; font-weight: 500; line-height: 1.5; }
  .evaluador-widget .cta-block a { color: var(--white); }

  .evaluador-widget .nota-fuente { font-size: 0.72rem; color: rgba(29,37,76,0.5); margin-top: 24px; line-height: 1.5; }
  .evaluador-widget .form-error { color: var(--red); font-size: 0.82rem; margin-top: 10px; display: none; }

  /* ── Footer ── */
  .evaluador-widget .site-footer { background: var(--navy); color: rgba(255,255,255,0.55); text-align: center; padding: 18px 24px; font-size: 0.75rem; line-height: 1.8; }
  .evaluador-widget .site-footer a { color: rgba(255,255,255,0.55); }
  .evaluador-widget .site-footer a:hover { color: var(--white); }

  @media (max-width: 480px) {
    .evaluador-widget .intro-titulo { font-size: 1.5rem; }
    .evaluador-widget .strip { gap: 8px; }
    .evaluador-widget .strip-item { padding: 8px 12px; }
    .evaluador-widget .score-display { gap: 12px; }
  }
</style>

<script>
const CFG = {{CFG_JSON}};
const BACKEND_URL = "{{BACKEND_URL}}";

const STATE = {
  nombre: "", empresa: "", municipio: "",
  email: "", tel: "", rgpd: false,
  respuestas: {},
  bloqueado: false,
  bloqueoMotivo: "",
};

function getPageUrl() {
  try { if (window.parent && window.parent !== window && window.parent.location) { return window.parent.location.href; } } catch (e) {}
  return window.location.href;
}

var SCREENS = [];
var currentIdx = 0;

// ── Helpers de tipo ──────────────────────────────
function isObjetivo(preg) {
  return !preg.tipo || preg.tipo === "objetivo";
}

// ── Build screen sequence ────────────────────────
function buildScreens() {
  SCREENS = [{ type: "inicio" }];
  (CFG.elegibilidad || []).forEach(function(_, i) {
    SCREENS.push({ type: "eleg", idx: i });
  });
  var grupos = CFG.grupos_baremo || [];
  if (grupos.length > 0) {
    grupos.forEach(function(g, i) {
      var pregsGrupo = (CFG.baremo || []).filter(function(p) {
        return (g.ids || []).indexOf(p.id) !== -1;
      });
      if (pregsGrupo.some(isObjetivo)) {
        SCREENS.push({ type: "grupo", idx: i });
      }
    });
  } else if ((CFG.baremo || []).some(isObjetivo)) {
    SCREENS.push({ type: "grupo", idx: -1 });
  }
  SCREENS.push({ type: "contacto" });
}

// ── Navigation ───────────────────────────────────
function avanzar() {
  if (currentIdx < SCREENS.length - 1) { currentIdx++; renderScreen(); }
}

function retroceder() {
  if (STATE.bloqueado) { STATE.bloqueado = false; renderScreen(); return; }
  if (currentIdx > 0) { currentIdx--; renderScreen(); }
}

function updateProgress() {
  var wrap = document.getElementById("progress-bar-wrap");
  var bar  = document.getElementById("progress-bar-inner");
  if (currentIdx === 0 && !STATE.bloqueado) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  var pct = Math.round(currentIdx / SCREENS.length * 100);
  bar.style.width = pct + "%";
}

function renderScreen() {
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
  if (STATE.bloqueado) { renderBloqueo(); return; }
  var s = SCREENS[currentIdx];
  if      (s.type === "inicio")   renderInicio();
  else if (s.type === "eleg")     renderEleg(s.idx);
  else if (s.type === "grupo")    renderGrupo(s.idx);
  else if (s.type === "contacto") renderContacto();
}

// ── Helpers ──────────────────────────────────────
function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function formatEur(n) { return Math.round(n).toLocaleString("es-ES") + " €"; }
function getBaremoById(id) {
  return (CFG.baremo || []).find(function(p) { return p.id === id; });
}
function setContent(html) {
  document.getElementById("screen-content").innerHTML = html;
}

// ── PASO 1 — Inicio ──────────────────────────────
function renderInicio() {
  var stripHtml = (CFG.strip || []).map(function(item) {
    return '<div class="strip-item">' +
      '<div class="strip-label">' + escHtml(item.label) + '</div>' +
      '<div class="strip-valor">' + escHtml(item.valor) + '</div>' +
      '</div>';
  }).join('');

  setContent(
    '<p class="intro-titulo">' + escHtml(CFG.textos.intro_titulo || "") + '</p>' +
    '<p class="intro-lead">' + escHtml(CFG.textos.intro_lead || "") + '</p>' +
    (stripHtml ? '<div class="strip">' + stripHtml + '</div>' : '') +
    '<div class="field"><label for="f-nombre">Tu nombre *</label>' +
    '<input type="text" id="f-nombre" placeholder="Nombre y apellidos" autocomplete="name" value="' + escHtml(STATE.nombre) + '" /></div>' +
    '<div class="field"><label for="f-empresa">Empresa *</label>' +
    '<input type="text" id="f-empresa" placeholder="Nombre de la empresa" autocomplete="organization" value="' + escHtml(STATE.empresa) + '" /></div>' +
    '<div class="field"><label for="f-municipio">Municipio</label>' +
    '<input type="text" id="f-municipio" placeholder="Municipio donde opera la empresa" autocomplete="address-level2" value="' + escHtml(STATE.municipio) + '" /></div>' +
    '<div class="rgpd-block">' +
    '<strong>Información sobre protección de datos</strong><br /><br />' +
    '<strong>Responsable:</strong> INNÓVATE 4.0 ESTRATEGIA EMPRESARIAL, S.L. — NIF B-01.734.813<br />' +
    '<strong>Dirección:</strong> C/ Almirante Cadarso 13-8ª, 46005 València<br />' +
    '<strong>Email:</strong> <a href="mailto:GDPR@INNOVATE40.ES">GDPR@INNOVATE40.ES</a><br /><br />' +
    'Tus datos se utilizarán exclusivamente para atender tu consulta sobre ayudas públicas y no se cederán a terceros sin tu consentimiento. ' +
    'Puedes ejercer tus derechos de acceso, rectificación, supresión y portabilidad en la dirección anterior.<br /><br />' +
    '<label class="rgpd-check"><input type="checkbox" id="f-rgpd" />' +
    '<span>He leído y acepto la <a href="https://innovate40.es/politica-de-privacidad/" target="_blank" rel="noopener noreferrer">política de privacidad</a> y el <a href="https://innovate40.es/aviso-legal/" target="_blank" rel="noopener noreferrer">aviso legal</a> de Innóvate 4.0 Estrategia Empresarial, S.L., y el tratamiento de mis datos para recibir información sobre esta convocatoria de ayudas públicas. *</span>' +
    '</label></div>' +
    '<div class="step-nav"><button class="btn btn-primary" onclick="onStep1Submit()">Comenzar el evaluador →</button></div>' +
    '<div class="form-error" id="e-step1">Por favor, completa los campos obligatorios y acepta la política de privacidad.</div>'
  );
}

function onStep1Submit() {
  var nombre  = document.getElementById("f-nombre").value.trim();
  var empresa = document.getElementById("f-empresa").value.trim();
  var rgpd    = document.getElementById("f-rgpd").checked;
  var errEl   = document.getElementById("e-step1");
  if (!nombre || !empresa || !rgpd) { errEl.style.display = "block"; return; }
  errEl.style.display = "none";
  STATE.nombre    = nombre;
  STATE.empresa   = empresa;
  STATE.municipio = document.getElementById("f-municipio").value.trim();
  STATE.rgpd      = rgpd;
  avanzar();
}

// ── PASO 2a — Elegibilidad (una pregunta por pantalla) ──
function renderEleg(idx) {
  var preg  = CFG.elegibilidad[idx];
  var total = CFG.elegibilidad.length;
  var saved = STATE.respuestas[preg.id];

  var optsHtml = preg.opciones.map(function(opt, opIdx) {
    var sel = (saved && saved.opIdx === opIdx) ? " selected" : "";
    return '<button class="opcion' + sel + '" id="eleg-opt-' + idx + '-' + opIdx + '" ' +
      'onclick="onElegOpt(' + idx + ',' + opIdx + ')" type="button">' +
      '<span class="opcion-radio"></span><span>' + escHtml(opt.label) + '</span>' +
      '</button>';
  }).join('');

  var backBtn     = idx > 0 ? '<button class="btn btn-secondary" onclick="retroceder()">← Atrás</button>' : '';
  var continueBtn = saved   ? '<button class="btn btn-primary" onclick="avanzar()">Continuar →</button>' : '';

  setContent(
    '<p class="section-header">Requisito de acceso — ' + (idx + 1) + ' de ' + total + '</p>' +
    '<div class="pregunta-block">' +
    '<p class="pregunta-titulo">' + escHtml(preg.pregunta) + '</p>' +
    (preg.ayuda ? '<p class="pregunta-ayuda">' + escHtml(preg.ayuda) + '</p>' : '') +
    '<div class="opciones-lista">' + optsHtml + '</div>' +
    '</div>' +
    '<div class="step-nav">' + backBtn + continueBtn + '</div>'
  );
}

function onElegOpt(pregIdx, opIdx) {
  var preg = CFG.elegibilidad[pregIdx];
  var opt  = preg.opciones[opIdx];

  // update UI selection
  preg.opciones.forEach(function(_, i) {
    var btn = document.getElementById("eleg-opt-" + pregIdx + "-" + i);
    if (btn) btn.classList.toggle("selected", i === opIdx);
  });

  STATE.respuestas[preg.id] = {
    opIdx: opIdx,
    puntos: 0,
    label: opt.label,
    esBloqueo: true,
    bloquea: !!opt.bloquea,
    motivo: opt.motivo || "",
    preguntaLabel: preg.pregunta,
    puntosMax: 0,
    influenciable: false,
  };

  if (opt.bloquea) {
    STATE.bloqueado     = true;
    STATE.bloqueoMotivo = opt.motivo || (CFG.textos.no_elegible_texto || "");

}

// ── PASO 2b–2e — Baremo por grupo ────────────────
function renderGrupo(groupIdx) {
  var grupos = CFG.grupos_baremo || [];
  var nombre, preguntas, grupoNum, totalGrupos;

  if (groupIdx === -1) {
    nombre      = "Criterios de valoración";
    preguntas   = (CFG.baremo || []).filter(isObjetivo);
    grupoNum    = null;
    totalGrupos = null;
  } else {
    var g = grupos[groupIdx];

    preguntas   = (CFG.baremo || []).filter(function(p) {
      return (g.ids || []).indexOf(p.id) !== -1 && isObjetivo(p);
    });
    grupoNum    = groupIdx + 1;
    totalGrupos = grupos.length;
  }

  var headerLabel = grupoNum
    ? "Criterio " + grupoNum + " de " + totalGrupos + " — " + nombre
    : nombre;

  var pregsHtml = preguntas.map(function(preg) {
    var saved = STATE.respuestas[preg.id];
    var optsHtml = preg.opciones.map(function(opt, opIdx) {
      var sel = (saved && saved.opIdx === opIdx) ? " selected" : "";

    }).join('');
    return '<div class="pregunta-block">' +
      '<p class="pregunta-titulo">' + escHtml(preg.pregunta) + '</p>' +
      (preg.ayuda ? '<p class="pregunta-ayuda">' + escHtml(preg.ayuda) + '</p>' : '') +

  var pregIds = preguntas.map(function(p) { return p.id; }).join(',');
  var backBtn = currentIdx > 0

  setContent(

    '<div class="form-error" id="e-grupo">Por favor, responde todas las preguntas de este bloque para continuar.</div>' +

    '<button class="btn btn-primary" data-ids="' + escHtml(pregIds) + '" onclick="onGrupoNext(this.dataset.ids)">Continuar →</button>' +

function onBaremoOpt(pregId, opIdx) {
  var preg = getBaremoById(pregId);

  preg.opciones.forEach(function(_, i) {

    opIdx: opIdx,

// ── Validación de formato ─────────────────────────
function isValidEmail(v) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
}
function isValidTel(v) {
  // Quita espacios y separadores; admite 9 dígitos, con prefijo +34/0034 opcional.
  var s = String(v || "").replace(/[\s.\-()]/g, "");
  return /^(?:\+34|0034)?\d{9}$/.test(s);
}

async function onContactoSubmit() {
  var emailEl = document.getElementById("f-email");
  var telEl   = document.getElementById("f-tel");
  var email = emailEl.value.trim();
  var tel   = telEl.value.trim();
  var errEl = document.getElementById("e-contacto");
  var btnEl = document.getElementById("btn-ver-resultado");

  // Honeypot: si el campo oculto viene relleno, es un envío automatizado.
  // Se descarta en silencio, sin mostrar resultado ni enviar nada.
  var honeypot = (document.getElementById("f-website") || {}).value || "";
  if (honeypot.trim()) { return; }

  emailEl.classList.remove("error");
  telEl.classList.remove("error");

  if (!email || !isValidEmail(email)) {
    emailEl.classList.add("error");
    errEl.textContent = email
      ? "El email no tiene un formato válido (ejemplo: nombre@empresa.com)."
      : "Indica tu email para ver el resultado.";
    errEl.style.display = "block";
    emailEl.focus();
    return;
  }
  if (!tel || !isValidTel(tel)) {
    telEl.classList.add("error");
    errEl.textContent = tel
      ? "El teléfono debe tener 9 dígitos (puedes incluir el prefijo +34)."
      : "Indica tu teléfono para ver el resultado.";
    errEl.style.display = "block";
    telEl.focus();
    return;
  }
  errEl.style.display = "none";
  STATE.email = email;
  STATE.tel   = tel;

  autoFillRedaccion();
  var score = calcularScore();

  if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Enviando..."; }

  var ok = await enviarEvaluacion(score);

  if (ok) {
    renderResultado(score);
  } else {
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Ver mi resultado →"; }
    errEl.textContent = "No hemos podido enviar la evaluación en este momento. Inténtalo de nuevo o contacta directamente con Innóvate 4.0.";
    errEl.style.display = "block";
  }
}

// ── Auto-relleno de criterios de redacción ───────
// Los criterios tipo "redaccion" no se preguntan al usuario: Innóvate 4.0
// se encarga de la memoria y se asume puntuación máxima en todos ellos.
function autoFillRedaccion() {
  (CFG.baremo || []).forEach(function(preg) {
    if (preg.tipo === "redaccion" && !STATE.respuestas[preg.id]) {
      STATE.respuestas[preg.id] = {
        opIdx: -1,
        puntos: preg.puntos_max || 0,
        label: "Redacción a cargo de Innóvate 4.0",
        esBloqueo: false,
        bloquea: false,
        preguntaLabel: preg.pregunta,
        puntosMax: preg.puntos_max || 0,
        influenciable: false,
        autoRedaccion: true,
      };
    }
  });
}

// ── Score ────────────────────────────────────────
function calcularScore() {
  var objetivo = 0, redaccion = 0, ganancia = 0;
  var max      = CFG.puntos_max_total || 0;
  var mejoras  = [];

  Object.keys(STATE.respuestas).forEach(function(id) {
    var r = STATE.respuestas[id];
    if (r.esBloqueo) return;
    if (r.autoRedaccion) {
      redaccion += r.puntos || 0;
    } else {
      objetivo += r.puntos || 0;
      if (r.influenciable && r.puntosMax > (r.puntos || 0)) {
        var g = r.puntosMax - (r.puntos || 0);
        ganancia += g;
        mejoras.push({ pregunta: r.preguntaLabel, puntos_ganables: g });
      }
    }
  });

  return {
    objetivo:   objetivo,
    redaccion:  redaccion,
    actual:     objetivo + redaccion,
    potencial:  objetivo + redaccion + ganancia,
    max:        max,
    mejoras:    mejoras,
  };
}

// ── Resumen legible para el email (etiquetas en castellano) ──
function buildResumen(score, veredicto) {
  var resumen = [
    { label: "Estado de elegibilidad", value: "Cumple los requisitos de acceso declarados" },
  ];
  if (score.max > 0) {
    resumen.push({ label: "Puntuación estimada", value: score.actual + " / " + score.max });
    if (score.potencial > score.actual) {
      resumen.push({ label: "Puntuación potencial trabajando mejoras", value: score.potencial + " / " + score.max });
    }
  }
  resumen.push({ label: "Veredicto", value: veredicto });
  if (STATE.municipio) resumen.push({ label: "Municipio", value: STATE.municipio });
  return resumen;
}

function buildPendingActions(score) {
  return (score.mejoras || []).map(function(m) {
    return {
      gain: "+" + m.puntos_ganables,
      title: m.pregunta,
      text: "Criterio influenciable: trabajarlo antes de presentar la solicitud puede sumar estos puntos.",
    };
  });
}

// ── Render resultado ─────────────────────────────
function renderResultado(score) {
  document.getElementById("progress-bar-wrap").style.display = "block";
  document.getElementById("progress-bar-inner").style.width = "100%";

  var empresa  = STATE.empresa;
  var pct      = score.max > 0 ? score.actual / score.max : 0;
  var veredicto = pct >= 0.65
    ? (CFG.textos.veredicto_alto  || "")
    : pct >= 0.35
      ? (CFG.textos.veredicto_medio || "")
      : (CFG.textos.veredicto_bajo  || "");
  veredicto = veredicto.replace(/\{empresa\}/g, empresa);

  var margen = Math.max(0, score.potencial - score.actual);

  // Mensaje de elegibilidad: quien llega a esta pantalla ha superado los requisitos de acceso.
  var elegBadge =
    '<p class="eleg-apto">✓ Tu empresa cumple los requisitos de acceso a esta convocatoria</p>';

  var html = "";

  if (score.max > 0) {
    var margenBox = margen > 0
      ? '<div class="score-box potencial">' +
        '<div class="score-num">+' + margen + '</div>' +
        '<div class="score-label">Puntos de margen de mejora</div>' +
        '</div>'
      : '';

    html +=
      '<div class="resultado-card">' +
      '<p class="resultado-empresa">' + escHtml(empresa) + '</p>' +
      elegBadge +
      '<p class="veredicto-texto">' + escHtml(veredicto) + '</p>' +
      '<div class="score-display">' +
      '<div class="score-box"><div class="score-num">' + score.actual + '</div>' +
      '<div class="score-label">Puntuación estimada</div></div>' +
      margenBox + '</div>' +
      '<div class="score-bar-wrap"><div class="score-bar-inner" id="bar-act"></div></div>' +
      '<p style="font-size:0.75rem;color:rgba(29,37,76,0.55);margin-top:6px;">Puntuación estimada sobre ' + score.max + ' puntos totales</p>' +
      '</div>';
  } else {
    html +=
      '<div class="resultado-card">' +
      '<p class="resultado-empresa">' + escHtml(empresa) + '</p>' +
      elegBadge +
      '<p class="veredicto-texto">' + escHtml(veredicto) + '</p>' +
      '</div>';
  }

  // Mensaje fijo: en concurrencia competitiva la puntuación se argumenta en la memoria.
  if (score.max > 0) {
    html +=
      '<div class="concurrencia-block">' +
      '<p>En concurrencia competitiva, la puntuación no se obtiene marcando casillas: ' +
      'cada criterio debe <strong>argumentarse y justificarse en la memoria técnica</strong>. ' +
      'Dos empresas con el mismo perfil pueden obtener puntuaciones muy distintas según cómo esté redactada su memoria.</p>' +
      '<p>Ahí es donde entra el trabajo de Innóvate 4.0: convertir tu margen de mejora en puntos reales sobre el papel.</p>' +
      '</div>';
  }

  var inv = CFG.inversion;
  if (inv) {
    html += '<p class="section-header">Estimación de la ayuda</p>' +
      '<div class="calc-block"><h3>Calculadora de ayuda estimada</h3>' +
      '<p class="calc-formula">' + escHtml(inv.formula_texto || "") + '</p>';
    if (inv.tiene_campo) {
      html += '<div class="field"><label for="calc-inv">' + escHtml(inv.etiqueta_campo || "Inversión elegible prevista (€)") + '</label>' +
        '<input type="number" id="calc-inv" placeholder="Ej: 150000" min="0" step="1000" /></div>' +
        '<div class="calc-result" id="calc-result"></div>';
    } else if (inv.importe_fijo) {
      html += '<div class="calc-result">' + formatEur(inv.importe_fijo) + '</div>';
    }
    html += '</div>';
  }

  html +=
    '<div class="cta-block">' +
    '<h2>' + escHtml(CFG.textos.cta_titulo || "") + '</h2>' +
    '<p class="cta-desc">' + escHtml(CFG.textos.cta_texto || "") + '</p>' +
    '<p class="cta-contacto">¿Hablamos? Escríbenos a ' +
    '<a href="mailto:proyectos2@innovate40.es">proyectos2@innovate40.es</a>' +
    ' o llámanos al <a href="tel:+34960666610">960 66 66 10</a>.</p>' +
    '</div>';

  if (CFG.textos.nota_fuente) {
    html += '<p class="nota-fuente">' + escHtml(CFG.textos.nota_fuente) + '</p>';
  }

  setContent(html);

  // Animate bar
  if (score.max > 0) {
    var pctA = Math.round((score.actual / score.max) * 100);
    setTimeout(function() { var b = document.getElementById("bar-act"); if (b) b.style.width = pctA + "%"; }, 100);
  }

  // Bind investment calculator
  if (inv && inv.tiene_campo) {
    var inp = document.getElementById("calc-inv");
    var res = document.getElementById("calc-result");
    if (inp && res) {
      inp.addEventListener("input", function() {
        var val  = parseFloat(inp.value) || 0;
        if (val <= 0) { res.textContent = ""; return; }
        var pMin = inv.pct_min || 0, pMax = inv.pct_max || 0, tope = inv.tope_euros || Infinity;
        var aMin = Math.min(val * pMin / 100, tope);
        var aMax = Math.min(val * pMax / 100, tope);
        res.textContent = pMin !== pMax
          ? "Ayuda estimada: " + formatEur(aMin) + " – " + formatEur(aMax)
          : "Ayuda estimada: " + formatEur(aMax);
      });
    }
  }
}

// ── Envío del resultado (vía backend + Resend) ────────────────────────────
// El resultado NUNCA se muestra hasta que el backend confirme el envío
// correcto del email al cliente (ver onContactoSubmit).
async function enviarEvaluacion(score) {
  if (!BACKEND_URL) return false;
  var pct = score.max > 0 ? score.actual / score.max : 0;
  var veredicto = pct >= 0.65
    ? (CFG.textos.veredicto_alto  || "")
    : pct >= 0.35
      ? (CFG.textos.veredicto_medio || "")
      : (CFG.textos.veredicto_bajo  || "");
  veredicto = veredicto.replace(/\{empresa\}/g, STATE.empresa);

  try {
    var res = await fetch(BACKEND_URL + "/submit-evaluation", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        source: "Evaluador de encaje Innóvate 4.0",
        tool: CFG.titulo_corto || (CFG.textos && CFG.textos.titulo_evaluador) || "",
        created_at: new Date().toISOString(),
        page_url: getPageUrl(),
        lead: {
          nombre: STATE.nombre,
          empresa: STATE.empresa,
          poblacion: STATE.municipio,
          telefono: STATE.tel,
          email: STATE.email,
          website: (document.getElementById("f-website") || {}).value || "",
          privacy: !!STATE.rgpd,
        },
        summary: buildResumen(score, veredicto),
        answers: STATE.respuestas,
        pending_actions: buildPendingActions(score),
        legal_note: "Resultado orientativo. La puntuación final depende de la evaluación del organismo convocante.",
      }),
    });
    var data = {};
    try { data = await res.json(); } catch (e) {}
    return res.ok && data.success !== false;
  } catch (e) {
    return false;
  }
}

  } catch (err) {
    document.getElementById("screen-content").innerHTML =
      '<div style="background:#c50339;color:#fff;padding:24px;margin:40px 0;">' +
      '<strong>Error al cargar el evaluador:</strong> ' + String(err) + '</div>';
  }
});
</script>
